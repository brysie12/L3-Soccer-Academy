<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black:#080C0A; --surface:#0E1410; --surface2:#141C16;
    --border:#1E2B20; --green:#2ECC5A; --green-dim:#1A7A36;
    --green-glow:rgba(46,204,90,0.15); --text:#E8F0EA;
    --text-muted:#6B8070; --text-dim:#3D5245; --white:#F0F7F2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;}
  
  /* Navigation Frame */
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,3rem);height:64px;background:rgba(8,12,10,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.08em;color:var(--green);text-decoration:none;}
  .nav-links{display:flex;gap:clamp(0.75rem,2vw,2rem);align-items:center;}
  .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.82rem;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s;cursor:pointer;}
  .nav-links a.active, .nav-links a:hover{color:var(--green);}
  .btn-nav{background:var(--green);color:var(--black);border:none;padding:8px 20px;border-radius:4px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;transition:all 0.2s;}
  .btn-nav:hover{background:var(--white);}

  /* Containers */
  .container { max-width:900px;margin:0 auto;padding:4rem 2rem;width:100%;flex-grow:1;}
  .section-label{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--green);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:1rem;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,3.5rem);line-height:1;color:var(--white);margin-bottom:0.5rem;}
  .section-desc{color:var(--text-muted);max-width:560px;line-height:1.8;margin-bottom:2.5rem;}

  /* Image Slots */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-bottom:2.5rem;}
  .photo-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;overflow:hidden;}
  .photo-card img { width:100%;height:100%;object-fit:cover; }

  /* Equipment Section styling rows */
  .eq-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem 2.5rem;margin-bottom:1.5rem;}
  .eq-list{display:flex;flex-direction:column;gap:2rem;}
  .eq-row{display:grid;grid-template-columns:1fr;gap:1.5rem;align-items:center;}
  @media (min-width: 600px) { .eq-row { grid-template-cols:1fr 1fr; } }
  .eq-img{border-radius:8px;overflow:hidden;border:1px solid var(--border);aspect-ratio:4/3;}
  .eq-img img { width:100%;height:100%;object-fit:cover; }
  .eq-info h4 { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.04em;color:var(--white);margin-bottom:0.4rem; }
  .eq-info p { color:var(--text-muted);font-size:0.88rem;line-height:1.75; }

  footer{border-top:1px solid var(--border);padding:2rem clamp(1.5rem,6vw,5rem);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;background:var(--surface);width:100%;}
  .footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--green);letter-spacing:0.08em;}
  .footer-copy{font-size:0.75rem;color:var(--text-dim);}
</style>
</head>
